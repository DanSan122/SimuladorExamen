<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen - Computación en la Sociedad</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --primary-color: #FF9800;
            --primary-hover: #F57C00;
            --secondary-color: #333;
            --card-bg: #2a2a2a;
            --border-color: #444;
            --highlight-color: #3a3a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #2c2c2c 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .logo {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #f5f5f5;
            font-weight: 300;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .info-box {
            background: var(--highlight-color);
            border-radius: 10px;
            padding: 25px;
            margin: 30px 0;
            border-left: 4px solid var(--primary-color);
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-weight: bold;
            color: var(--primary-color);
        }

        .info-value {
            color: var(--text-color);
        }

        .start-button {
            background: linear-gradient(45deg, var(--primary-color), #FFB74D);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .start-button:hover {
            background: linear-gradient(45deg, var(--primary-hover), #FF9800);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.4);
        }

        .back-button {
            background: var(--secondary-color);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .back-button:hover {
            background: var(--primary-color);
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2rem;
            }

            .info-box {
                padding: 20px;
            }

            .start-button {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-button">← Volver al Inicio</a>
        
        <div class="logo">💻</div>
        
        <h1>Computación en la Sociedad</h1>
        <p class="subtitle">Evaluación sobre el impacto de la computación en la sociedad moderna</p>
        
        <div class="info-box">
            <div class="info-item">
                <span class="info-label">⏱️ Duración:</span>
                <span class="info-value">25 minutos</span>
            </div>
            <div class="info-item">
                <span class="info-label">📚 Preguntas:</span>
                <span class="info-value">20 aleatorias</span>
            </div>
            <div class="info-item">
                <span class="info-label">🎯 Dificultad:</span>
                <span class="info-value">Intermedia</span>
            </div>
        </div>
        
        <button class="start-button" onclick="location.href='./main.html'">
            🚀 Iniciar Examen
        </button>
    </div>
</body>
</html>
